<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card:#0f1620;
      --muted:#9fb0c0;
      --text:#e8eef6;
      --border:rgba(255,255,255,.10);
      --accent:#7cc4ff;
      --accent2:#62e6a5;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(124,196,255,.18), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(98,230,165,.12), transparent 55%),
        var(--bg);
      color:var(--text);
    }
    .wrap{ width:min(920px, 94vw); margin:0 auto; padding:14px 14px 26px; }

    .top{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      margin: 6px 0 14px;
      text-align:center;
    }
    .logo{
      width:min(320px, 72vw);
      height:auto;
      object-fit:contain;
      display:block;
      filter: drop-shadow(0 18px 28px rgba(0,0,0,.55));
    }
    h1{ margin:0; font-size:18px; letter-spacing:.2px; }
    .hint{ margin:0; color:var(--muted); font-size:13px; }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 55%), var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      box-shadow: 0 14px 40px rgba(0,0,0,.45);
    }

    .controls{
      display:grid;
      gap:10px;
      margin-bottom: 12px;
    }
    .row2{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
    }
    @media (min-width: 560px){
      .row2{ grid-template-columns: 1fr 220px; }
    }

    input{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(11,18,32,.85);
      color: var(--text);
      outline:none;
      font-size:15px;
    }

    .btn{
      display:inline-block;
      width:100%;
      text-align:center;
      text-decoration:none;
      padding:12px 14px;
      border-radius:16px;
      font-size:14px;
      font-weight:900;
      letter-spacing:.3px;
      color:var(--text);
      border: 1px solid rgba(124,196,255,.28);
      background: linear-gradient(180deg, rgba(124,196,255,.28), rgba(124,196,255,.10));
      cursor:pointer;
    }
    .btn.secondary{
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      color: var(--muted);
      font-weight:850;
    }

    .topActions{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
      margin-top: 4px;
      width: 100%;
      max-width: 520px;
    }
    @media (min-width: 560px){
      .topActions{ grid-template-columns: 1fr 1fr; }
    }

    .list{
      display:grid;
      gap:10px;
    }

    .item{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      border-radius:16px;
      padding:12px;
      cursor:pointer;
      transition: transform .06s ease, border-color .12s ease;
      display:flex;
      gap:12px;
      align-items:flex-start;
      justify-content:space-between;
    }
    .item:hover{ border-color: rgba(124,196,255,.22); }
    .item:active{ transform: translateY(1px); }

    .itemLeft{ min-width:0; flex: 1 1 auto; }
    .itemRight{ flex: 0 0 auto; display:flex; align-items:center; gap:10px; }

    .pill{
      display:inline-block;
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(124,196,255,.25);
      background: rgba(124,196,255,.10);
      color: var(--text);
      font-weight:850;
      white-space:nowrap;
    }
    .pill.ok{
      border:1px solid rgba(98,230,165,.25);
      background: rgba(98,230,165,.10);
    }

    .meta{
      color: var(--muted);
      font-size:12px;
      line-height:1.25;
      margin-top:8px;
    }

    /* note max 2 righe + ... */
    .preview{
      margin-top:8px;
      font-size:13px;
      color: rgba(232,238,246,.92);
      display:-webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow:hidden;
    }

    .chev{
      color: rgba(232,238,246,.55);
      font-weight: 900;
      font-size: 18px;
      line-height: 1;
      margin-top: 4px;
      user-select:none;
    }

    .empty{
      padding:12px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.18);
      color: var(--muted);
      background: rgba(255,255,255,.02);
      font-size:13px;
      text-align:center;
    }

    .smallNote{
      margin-top:10px;
      color: rgba(159,176,192,.85);
      font-size: 12px;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <img class="logo" src="{{ url_for('static', filename='img/LOGO.png') }}" alt="Logo">
      <h1>Storico Report</h1>
      <p class="hint">Cerca e apri i report salvati (Excel + allegati).</p>

      <div class="topActions">
        <a class="btn secondary" href="/MedicairGeek/">← Home</a>
        <button class="btn" id="btnReload" type="button">Aggiorna</button>
      </div>
    </div>

    <div class="card">
      <div class="controls">
        <div class="row2">
          <input id="q" type="text" placeholder="Cerca: robot, zona, errore, note…">
          <button id="btnSearch" class="btn" type="button">Cerca</button>
        </div>

        <div class="row2">
          <input id="robot" type="text" placeholder="Filtro robot (es. 16278)">
          <button id="btnReset" class="btn secondary" type="button">Reset</button>
        </div>
      </div>

      <div id="list" class="list"></div>
      <div id="listEmpty" class="empty" style="display:none;">Nessun report trovato.</div>

      <div class="smallNote">Suggerimento: usa il filtro robot per trovare subito un ID specifico.</div>
    </div>
  </div>

  <script>
    const listEl = document.getElementById("list");
    const listEmptyEl = document.getElementById("listEmpty");

    const qEl = document.getElementById("q");
    const robotEl = document.getElementById("robot");
    const btnSearch = document.getElementById("btnSearch");
    const btnReset = document.getElementById("btnReset");
    const btnReload = document.getElementById("btnReload");

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    function setListLoading(){
      listEl.innerHTML = `<div class="empty">Caricamento…</div>`;
      listEmptyEl.style.display = "none";
    }

    function goDetail(id){
      window.location.href = `/MedicairGeek/storicoReport/${id}`;
    }

    function renderList(items){
      listEl.innerHTML = "";
      if(!items || !items.length){
        listEmptyEl.style.display = "block";
        return;
      }
      listEmptyEl.style.display = "none";

      for(const it of items){
        const has = !!it.has_folder;
        const pill = has
          ? `<span class="pill ok">📎 Allegati</span>`
          : `<span class="pill">Solo Excel</span>`;

        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <div class="itemLeft">
            ${pill}
            <div class="meta">
              <b>ID:</b> ${esc(it.id)}<br>
              <b>Data:</b> ${esc(it.dt_label)}<br>
              <b>Robot:</b> ${esc(it.robot)}
            </div>
            <div class="preview">${esc(it.note_preview || "")}</div>
          </div>

          <div class="itemRight">
            <div class="chev">›</div>
          </div>
        `;

        div.addEventListener("click", () => goDetail(it.id));
        listEl.appendChild(div);
      }
    }

    async function loadList(){
      setListLoading();

      const q = (qEl.value || "").trim();
      const robot = (robotEl.value || "").trim();

      const params = new URLSearchParams();
      if(q) params.set("q", q);
      if(robot) params.set("robot", robot);
      params.set("limit", "300");

      try{
        const res = await fetch(`/MedicairGeek/ConsultaReport/list?${params.toString()}`, { cache: "no-store" });
        const data = await res.json();

        if(!data.ok){
          listEl.innerHTML = `<div class="empty">Errore nel caricamento lista.</div>`;
          return;
        }

        renderList(data.reports || []);
        // salva filtri (così se torni indietro li ritrovi)
        localStorage.setItem("storico_q", q);
        localStorage.setItem("storico_robot", robot);
      }catch(e){
        listEl.innerHTML = `<div class="empty">Errore di rete.</div>`;
      }
    }

    // Eventi
    btnSearch.addEventListener("click", loadList);

    btnReset.addEventListener("click", () => {
      qEl.value = "";
      robotEl.value = "";
      localStorage.removeItem("storico_q");
      localStorage.removeItem("storico_robot");
      loadList();
    });

    btnReload.addEventListener("click", loadList);

    // Invio con Enter
    qEl.addEventListener("keydown", (e) => { if(e.key === "Enter") loadList(); });
    robotEl.addEventListener("keydown", (e) => { if(e.key === "Enter") loadList(); });

    // Ripristina filtri
    (function restoreFilters(){
      const q = localStorage.getItem("storico_q") || "";
      const robot = localStorage.getItem("storico_robot") || "";
      qEl.value = q;
      robotEl.value = robot;
    })();

    // auto-load
    loadList();
  </script>
</body>
</html>
