<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or "Storico Report" }}</title>

  <style>
    :root{
      --bg:#0b0f14;
      --card:#0f1620;
      --muted:#9fb0c0;
      --text:#e8eef6;
      --border:rgba(255,255,255,.10);

      --cat-incidente:#2ecc71;
      --cat-incidente-grave:#ff9f43;
      --cat-software:#9b59ff;
      --cat-hardware:#ff5a5a;
      --cat-altro:#4da3ff;
      --cat-manutenzione:#ffffff;

      --accent:#7cc4ff;
      --warning:#ffe37a;
      --danger:#ff8f8f;
      --ok:#7ce3a1;

      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(124,196,255,.18), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(77,163,255,.10), transparent 55%),
        var(--bg);
      color:var(--text);
    }

    .wrap{
      width:min(860px, 94vw);
      margin:0 auto;
      padding:16px 14px 26px;
    }

    .top{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .logo{
      width:56px;
      height:56px;
      border-radius:14px;
      object-fit:contain;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      padding:6px;
      flex:0 0 auto;
    }

    h1{
      margin:0;
      font-size:20px;
      letter-spacing:.2px;
    }

    .sub{
      margin:3px 0 0;
      font-size:13px;
      color:var(--muted);
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.03), transparent 55%), var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      box-shadow:0 14px 40px rgba(0,0,0,.45);
    }

    .filters{
      display:grid;
      grid-template-columns:minmax(0, 1fr) auto auto;
      gap:8px;
      margin-bottom:14px;
      align-items:center;
    }

    .search{
      width:100%;
      min-width:0;
      padding:11px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(11,18,32,.85);
      color:var(--text);
      font-size:14px;
      outline:none;
    }

    .search::placeholder{
      color:rgba(159,176,192,.75);
    }

    .btn{
      padding:10px 12px;
      min-height:40px;
      border-radius:12px;
      border:1px solid rgba(124,196,255,.24);
      background:linear-gradient(180deg, rgba(124,196,255,.22), rgba(124,196,255,.08));
      color:var(--text);
      font-size:13px;
      font-weight:800;
      letter-spacing:.2px;
      cursor:pointer;
      white-space:nowrap;
    }

    .btn.secondary{
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      color:var(--muted);
    }

    .list{
      display:grid;
      gap:12px;
    }

    .report-card{
      display:block;
      text-decoration:none;
      color:inherit;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
      border-left:6px solid #999;
      border-radius:14px;
      padding:14px 14px 14px 16px;
      transition:transform .14s ease, background .14s ease;
    }

    .report-card:hover{
      background:rgba(255,255,255,.055);
      transform:translateY(-1px);
    }

    .cat-incidente{ border-left-color:var(--cat-incidente); }
    .cat-incidente-grave{ border-left-color:var(--cat-incidente-grave); }
    .cat-software{ border-left-color:var(--cat-software); }
    .cat-hardware{ border-left-color:var(--cat-hardware); }
    .cat-manutenzione{ border-left-color:var(--cat-manutenzione); }
    .cat-altro{ border-left-color:var(--cat-altro); }

    .report-date{
      font-size:17px;
      font-weight:900;
      line-height:1.2;
      margin-bottom:5px;
      word-break:break-word;
    }

    .report-title{
      font-size:15px;
      font-weight:800;
      line-height:1.3;
      margin-bottom:7px;
      word-break:break-word;
    }

    .report-meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:6px;
      font-size:12px;
      color:var(--muted);
    }

    .report-text{
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
      word-break:break-word;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .empty{
      padding:18px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.12);
      color:var(--muted);
      text-align:center;
      font-size:14px;
    }

    .loading{
      padding:18px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.12);
      color:var(--muted);
      text-align:center;
      font-size:14px;
    }

    .error{
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,107,107,.12);
      border:1px solid rgba(255,107,107,.28);
      color:#ffd7d7;
      font-size:13px;
    }

    .update-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:22px;
      height:22px;
      padding:0 8px;
      border-radius:999px;
      background:rgba(255, 214, 10, .16);
      border:1px solid rgba(255, 214, 10, .45);
      color:#ffe37a;
      font-size:11px;
      font-weight:900;
      letter-spacing:.3px;
      vertical-align:middle;
    }

    .report-title-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:7px;
    }

    .report-title{
      font-size:15px;
      font-weight:800;
      line-height:1.3;
      margin-bottom:0;
      word-break:break-word;
      flex:1 1 auto;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="top">
      <img class="logo" src="{{ url_for('static', filename='img/LOGO.png') }}" alt="Logo">
      <div>
        <h1>Storico Report</h1>
        <p class="sub">Elenco report ordinati dal più recente al meno recente</p>
      </div>
    </div>

    <div class="card">
      <div class="filters">
        <input
          id="searchInput"
          class="search"
          type="text"
          placeholder="Cerca per titolo, categoria, robot o testo..."
        >
        <button id="btnSearch" class="btn" type="button">Cerca</button>
        <button id="btnReset" class="btn secondary" type="button">Reset</button>
      </div>

      <div id="errorBox" style="display:none;"></div>
      <div id="content">
        <div id="loading" class="loading">Caricamento report…</div>
        <div id="list" class="list" style="display:none;"></div>
        <div id="empty" class="empty" style="display:none;">Nessun report trovato.</div>
      </div>
    </div>

  </div>

  <script>
    (function(){
      const searchInput = document.getElementById("searchInput");
      const btnSearch = document.getElementById("btnSearch");
      const btnReset = document.getElementById("btnReset");

      const errorBox = document.getElementById("errorBox");
      const loadingEl = document.getElementById("loading");
      const listEl = document.getElementById("list");
      const emptyEl = document.getElementById("empty");

      function escapeHtml(value){
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function getCategoriaCss(cat){
        const v = String(cat || "").trim().toLowerCase();

        if(v === "incidente") return "cat-incidente";
        if(v === "incidente grave") return "cat-incidente-grave";
        if(v === "problema software") return "cat-software";
        if(v === "problema hardware") return "cat-hardware";
        if(v === "intervento manutenzione") return "cat-manutenzione";
        return "cat-altro";
      }

      function setLoading(show){
        loadingEl.style.display = show ? "block" : "none";
      }

      function setError(message){
        if(!message){
          errorBox.style.display = "none";
          errorBox.innerHTML = "";
          return;
        }

        errorBox.style.display = "block";
        errorBox.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
      }

      function renderReports(reports){
        listEl.innerHTML = "";

        if(!reports || reports.length === 0){
          listEl.style.display = "none";
          emptyEl.style.display = "block";
          return;
        }

        emptyEl.style.display = "none";
        listEl.style.display = "grid";

        const html = reports.map(r => {
          const css = getCategoriaCss(r.categoria);
          const dt = escapeHtml(r.dt_label || "");
          const titolo = escapeHtml(r.titolo || "Senza titolo");
          const updateBadge = r.has_update ? `<span class="update-badge">UPDATE</span>` : "";
          const id = escapeHtml(r.id || "");
          const robot = escapeHtml(r.robot || "-");
          const preview = escapeHtml(r.note_preview || "");
          const href = `/MedicairGeek/storicoReport/${encodeURIComponent(r.id)}`;

          return `
          <a class="report-card ${css}" href="${href}">
            <div class="report-date">${dt}</div>

            <div class="report-title-row">
              <div class="report-title">${titolo}</div>
              ${updateBadge}
            </div>

            <div class="report-meta">
              <span>ID: #${id}</span>
              <span>Robot: ${robot}</span>
            </div>

            <div class="report-text">${preview || "-"}</div>
          </a>
        `;
        }).join("");

        listEl.innerHTML = html;
      }

      async function loadReports(){
        setError("");
        setLoading(true);
        listEl.style.display = "none";
        emptyEl.style.display = "none";

        try{
          const q = searchInput.value.trim();
          const url = new URL("/MedicairGeek/ConsultaReport/list", window.location.origin);
          if(q) url.searchParams.set("q", q);
          url.searchParams.set("limit", "300");

          const res = await fetch(url.toString(), { cache: "no-store" });
          const data = await res.json();

          if(!res.ok || !data.ok){
            throw new Error(data.error || "Errore nel caricamento dei report.");
          }

          renderReports(data.reports || []);
        }catch(err){
          setError(err.message || "Errore nel caricamento dei report.");
        }finally{
          setLoading(false);
        }
      }

      btnSearch.addEventListener("click", loadReports);

      btnReset.addEventListener("click", function(){
        searchInput.value = "";
        loadReports();
      });

      searchInput.addEventListener("keydown", function(ev){
        if(ev.key === "Enter"){
          ev.preventDefault();
          loadReports();
        }
      });

      loadReports();
    })();
  </script>
</body>
</html>
