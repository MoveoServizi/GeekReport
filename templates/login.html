<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedicairGeek - Login</title>
  <link rel="icon" href="{{ url_for('static', filename='img/CUBO.png') }}">
  <link rel="shortcut icon" href="{{ url_for('static', filename='img/CUBO.png') }}">
  <style>
    :root{
      --bg:#0b0f14;
      --card:#0f1620;
      --muted:#9fb0c0;
      --text:#e8eef6;
      --accent:#7cc4ff;
      --accent2:#62e6a5;
      --danger:#ff6b6b;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(124,196,255,.18), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(98,230,165,.12), transparent 55%),
        var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .wrap{ width:min(520px, 94vw); padding:16px; }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 55%), var(--card);
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:24px 20px;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }
    .header{ text-align:center; margin-bottom:20px; }
    .header img{ width:80px; height:auto; display:block; margin:0 auto 14px; }
    .header h1{ margin:0; font-size:24px; letter-spacing:.2px; }
    .header p{ margin:8px 0 0; color:var(--muted); font-size:13px; }
    .field{ margin-bottom:16px; }
    .field label{ display:block; margin-bottom:8px; color:var(--muted); font-size:13px; font-weight:700; }
    .field input{
      width:100%; padding:14px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      color:var(--text);
      font-size:15px;
    }
    .field input:focus{ outline:none; border-color:rgba(124,196,255,.55); }
    .btn{
      width:100%; display:inline-flex;
      align-items:center; justify-content:center;
      padding:14px 16px;
      border-radius:14px;
      border:1px solid rgba(124,196,255,.28);
      background:linear-gradient(180deg, rgba(124,196,255,.28), rgba(124,196,255,.10));
      color:var(--text);
      font-weight:900;
      letter-spacing:.2px;
      text-decoration:none;
      cursor:pointer;
    }
    .error{ margin:0 0 14px; color:var(--danger); font-size:14px; }
    .error-banner{
      margin:0 0 20px;
      padding:14px 16px;
      border-radius:14px;
      border:1.5px solid rgba(255,107,107,.45);
      background:linear-gradient(180deg, rgba(255,107,107,.15), rgba(255,107,107,.08));
      color:#ffd7d7;
      font-size:14px;
      font-weight:600;
      letter-spacing:.3px;
      display:flex;
      align-items:center;
      gap:10px;
      animation:bannerShake .4s ease-in-out;
    }
    .error-banner::before{
      content:"⚠";
      font-size:20px;
      flex:0 0 auto;
    }
    @keyframes bannerShake{
      0%, 100%{ transform:translateX(0); }
      25%{ transform:translateX(-6px); }
      75%{ transform:translateX(6px); }
    }
    .hint{ margin-top:16px; color:var(--muted); font-size:13px; line-height:1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <img src="{{ url_for('static', filename='img/LOGO.png') }}" alt="Logo MedicairGeek">
        <h1>Accesso MedicairGeek</h1>
        <p>Inserisci le credenziali e salva la password nel browser.</p>
      </div>

      {% if error %}
      <div class="error-banner">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('login') }}">
        <input type="hidden" name="next" value="{{ next or '' }}">
        <div class="field">
          <label for="username">Utente</label>
          <input id="username" name="username" type="text" autocomplete="username" placeholder="nome utente" required autofocus>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="password" required>
        </div>
        <button class="btn" type="submit">Accedi</button>
      </form>

      <p class="hint">Usa un browser moderno: Google/Edge possono ricordare automaticamente le credenziali.</p>
    </div>
  </div>
</body>
</html>
