<!doctype html>
<html lang="it">
<head>
  
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedicairGeek - Home</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card:#0f1620;
      --muted:#9fb0c0;
      --text:#e8eef6;
      --accent:#7cc4ff;
      --accent2:#62e6a5;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(124,196,255,.18), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(98,230,165,.12), transparent 55%),
        var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .wrap{ width:min(720px, 94vw); padding:16px; }

    /* Logo: grande e "libero" (senza box) */
    .top{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-bottom:14px;
      text-align:center;
    }
    .logo{
      width:min(320px, 72vw);
      height:auto;
      object-fit:contain;
      display:block;
      filter: drop-shadow(0 18px 28px rgba(0,0,0,.55));
    }
    h1{ font-size:18px; margin:0; letter-spacing:.2px;}
    .hint{ font-size:13px; color:var(--muted); margin:0; }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 55%), var(--card);
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:18px 16px;
      box-shadow: 0 14px 40px rgba(0,0,0,.45);
    }

    .buttons{ display:grid; gap:12px; margin-top:12px; }
    .btn{
      display:block;
      text-align:center;
      text-decoration:none;
      padding:14px 14px;
      border-radius:16px;
      font-size:16px;
      font-weight:850;
      letter-spacing:.3px;
      color:var(--text);
      border: 1px solid rgba(124,196,255,.28);
      background: linear-gradient(180deg, rgba(124,196,255,.28), rgba(124,196,255,.10));
    }
    .btn.secondary{
      border: 1px solid rgba(98,230,165,.26);
      background: linear-gradient(180deg, rgba(98,230,165,.22), rgba(98,230,165,.08));
    }
    .btn:active{ transform: translateY(1px); }
    .footer{
      margin-top:14px;
      color: rgba(159,176,192,.85);
      font-size:12px;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <img class="logo" src="{{ url_for('static', filename='img/LOGO.png') }}" alt="Logo">
      <h1>MedicairGeek</h1>
      <div class="hint">Seleziona il tipo di report da compilare.</div>
    </div>

    <div class="card">
      <div class="buttons">
        <!-- dentro <div class="buttons"> ... -->
        <a class="btn" href="/MedicairGeek/reportIncidente">Report Incidente</a>
        <a class="btn" href="/MedicairGeek/storicoReport">Storico Report</a>
        <a class="btn secondary" href="/MedicairGeek/reportIntervento">Report Intervento</a>
      </div>
      <div class="footer">Moveo Servizi</div>
    </div>
  </div>
</body>
</html>
