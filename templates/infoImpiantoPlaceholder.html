<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <link rel="icon" href="{{ url_for('static', filename='img/CUBO.png') }}">
  <style>
    :root{
      --bg:#0b0f14;
      --card:#0f1620;
      --muted:#9fb0c0;
      --text:#e8eef6;
      --border:rgba(255,255,255,.08);
      --accent:#7cc4ff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(124,196,255,.18), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(119,230,138,.12), transparent 55%),
        var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .wrap{ width:min(760px, 94vw); padding:16px; }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 55%), var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:20px 16px;
      box-shadow: 0 14px 40px rgba(0,0,0,.45);
      text-align:center;
    }
    .logo{
      width:92px;
      height:92px;
      object-fit:contain;
      display:block;
      margin:0 auto 10px;
      filter: drop-shadow(0 18px 28px rgba(0,0,0,.55));
    }
    h1{ margin:0 0 6px; font-size:22px; }
    .sub{ margin:0; color:var(--muted); font-size:14px; }
    .pill{
      margin-top:14px;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      color:var(--muted);
    }
    .actions{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:16px; }
    .btn{
      text-decoration:none;
      color:var(--text);
      border:1px solid rgba(124,196,255,.28);
      background: linear-gradient(180deg, rgba(124,196,255,.28), rgba(124,196,255,.10));
      border-radius:14px;
      padding:10px 14px;
      font-size:13px;
      font-weight:900;
      display:inline-block;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <a href="/MedicairGeek/" aria-label="Torna alla Home">
        <img class="logo" src="{{ url_for('static', filename='img/CUBO.png') }}" alt="Logo">
      </a>
      <h1>{{ item_label }}</h1>
      <p class="sub">Sezione {{ section_label }}</p>

      <div class="pill">
        Questa pagina è ancora <b>in costruzione</b>. La struttura è pronta e verrà completata nei prossimi step.
      </div>

      <div class="actions">
        <a class="btn" href="/MedicairGeek/infoImpianto">Torna a Info Impianto</a>
        <a class="btn" href="/MedicairGeek/">Home</a>
      </div>
    </div>
  </div>
</body>
</html>
