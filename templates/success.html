<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card:#0f1620;
      --muted:#9fb0c0;
      --text:#e8eef6;
      --border:#223041;
      --accent:#7cc4ff;
      --ok:#77e68a;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body{
      margin:0;
      background: radial-gradient(1200px 500px at 20% -10%, rgba(124,196,255,.18), transparent 60%),
                  radial-gradient(900px 500px at 110% 10%, rgba(119,230,138,.12), transparent 55%),
                  var(--bg);
      color:var(--text);
    }
    .wrap{ max-width:720px; margin:0 auto; padding:14px; }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 55%), var(--card);
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:14px;
      box-shadow: 0 14px 40px rgba(0,0,0,.45);
    }
    .header{
      display:flex; align-items:center; gap:12px;
      padding:6px 2px 10px;
    }
    .logo{
      width:44px; height:44px; border-radius:12px;
      object-fit: contain; background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      padding:6px;
    }
    h1{ font-size:17px; margin:0; letter-spacing:.2px;}
    .hint{ font-size:12px; color:var(--muted); margin:2px 0 0; }

    .okbox{
      padding:12px;
      border-radius:14px;
      background: rgba(119,230,138,.10);
      border: 1px solid rgba(119,230,138,.25);
      color: #d9ffe0;
      margin-top: 10px;
    }
    .meta{ font-size:13px; color: var(--text); margin-top: 10px; }
    .muted{ color: var(--muted); }

    ul{ margin: 8px 0 0 18px; color: var(--text); }
    li{ margin: 4px 0; }

    a.btn{
      display:inline-block;
      margin-top:12px;
      text-decoration:none;
      padding:12px 14px;
      border-radius:16px;
      border: 1px solid rgba(124,196,255,.28);
      background: linear-gradient(180deg, rgba(124,196,255,.28), rgba(124,196,255,.10));
      color: var(--text);
      font-weight: 850;
      letter-spacing:.3px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

      <div class="header">
        <img class="logo" src="{{ url_for('static', filename='img/LOGO.png') }}" alt="Logo">
        <div>
          <h1>{{ title }}</h1>
          <p class="hint">Report salvato correttamente.</p>
        </div>
      </div>

      <div class="okbox">
        Report inserito ?
        <div class="meta">
          <b>ID:</b> {{ report_id }}<br>
          <b>Cartella:</b> <span class="muted">report/{{ folder_name }}</span>
        </div>
      </div>

      {% if saved_files and saved_files|length > 0 %}
        <div class="meta"><b>File salvati:</b></div>
        <ul>
          {% for f in saved_files %}
            <li>{{ f }}</li>
          {% endfor %}
        </ul>
      {% endif %}

      <a class="btn" href="/Geekplus/reportMedicair">Nuovo report</a>

    </div>
  </div>
</body>
</html>
