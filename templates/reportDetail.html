<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card:#0f1620;
      --muted:#9fb0c0;
      --text:#e8eef6;
      --border:rgba(255,255,255,.10);

      --cat-incidente:#2ecc71;
      --cat-software:#9b59ff;
      --cat-hardware:#ff5a5a;
      --cat-altro:#4da3ff;

      --accent:#7cc4ff;
      --warning:#ffe37a;
      --danger:#ff8f8f;
      --ok:#7ce3a1;

      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(124,196,255,.18), transparent 60%),
        radial-gradient(900px 500px at 110% 10%, rgba(77,163,255,.12), transparent 55%),
        var(--bg);
      color:var(--text);
    }

    .wrap{
      width:min(920px, 94vw);
      margin:0 auto;
      padding:14px 14px 26px;
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin:6px 0 12px;
    }

    .left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .logo{
      width:54px;
      height:54px;
      border-radius:16px;
      object-fit:contain;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      padding:8px;
      flex:0 0 auto;
    }

    .page-small{
      margin:0;
      font-size:13px;
      color:var(--muted);
      font-weight:700;
      letter-spacing:.2px;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      padding:10px 12px;
      border-radius:16px;
      font-size:13px;
      font-weight:900;
      letter-spacing:.3px;
      color:var(--text);
      border:1px solid rgba(124,196,255,.28);
      background:linear-gradient(180deg, rgba(124,196,255,.28), rgba(124,196,255,.10));
      cursor:pointer;
    }

    .btn.secondary{
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      color:var(--muted);
    }

    .btn.warning{
      border:1px solid rgba(255,227,122,.30);
      background:linear-gradient(180deg, rgba(255,227,122,.18), rgba(255,227,122,.08));
      color:#ffe37a;
    }

    .btn:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.03), transparent 55%), var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
      box-shadow:0 14px 40px rgba(0,0,0,.45);
    }

    .hero{
      border-left:6px solid #999;
      border-radius:16px;
      padding:14px 14px 14px 16px;
      background:rgba(255,255,255,.03);
      border-top:1px solid rgba(255,255,255,.06);
      border-right:1px solid rgba(255,255,255,.06);
      border-bottom:1px solid rgba(255,255,255,.06);
      margin-bottom:14px;
    }

    .cat-incidente{ border-left-color:var(--cat-incidente); }
    .cat-software{ border-left-color:var(--cat-software); }
    .cat-hardware{ border-left-color:var(--cat-hardware); }
    .cat-altro{ border-left-color:var(--cat-altro); }

    .hero-date{
      font-size:18px;
      font-weight:900;
      line-height:1.2;
      margin-bottom:5px;
      word-break:break-word;
    }

    .hero-title{
      font-size:22px;
      font-weight:900;
      line-height:1.2;
      margin-bottom:8px;
      word-break:break-word;
    }

    .hero-row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      font-size:12px;
      font-weight:800;
      color:var(--text);
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      display:inline-block;
      flex:0 0 auto;
    }

    .dot-incidente{ background:var(--cat-incidente); }
    .dot-software{ background:var(--cat-software); }
    .dot-hardware{ background:var(--cat-hardware); }
    .dot-altro{ background:var(--cat-altro); }

    .sectionTitle{
      margin:12px 0 8px;
      font-size:12px;
      color:var(--muted);
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.3px;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:0 0 14px;
    }

    .kv{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-bottom:12px;
    }

    @media (min-width: 760px){
      .kv{
        grid-template-columns:1fr 1fr;
      }
    }

    .box{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      border-radius:14px;
      padding:10px 12px;
      font-size:13px;
      line-height:1.35;
      min-width:0;
    }

    .boxLabel{
      display:block;
      font-size:12px;
      font-weight:900;
      color:var(--muted);
      margin-bottom:4px;
      text-transform:uppercase;
      letter-spacing:.2px;
    }

    .boxValue{
      color:var(--text);
      word-break:break-word;
    }

    .note{
      white-space:pre-wrap;
      line-height:1.45;
      font-size:14px;
      word-break:break-word;
    }

    .attachGrid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:10px;
    }

    @media (min-width: 560px){
      .attachGrid{
        grid-template-columns:1fr 1fr;
      }
    }

    .attach{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      border-radius:16px;
      padding:10px;
    }

    .attachName{
      font-size:12px;
      color:var(--muted);
      margin:0 0 8px;
      word-break:break-word;
    }

    img.previewImg{
      width:100%;
      height:auto;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      display:block;
    }

    video.previewVid{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      display:block;
      margin-bottom:8px;
    }

    a.fileLink{
      display:inline-block;
      color:var(--text);
      font-weight:900;
      text-decoration:none;
      border:1px solid rgba(124,196,255,.28);
      background:rgba(124,196,255,.10);
      padding:10px 12px;
      border-radius:14px;
    }

    .empty{
      padding:12px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.18);
      color:var(--muted);
      background:rgba(255,255,255,.02);
      font-size:13px;
      text-align:center;
    }

    .actions{
      display:grid;
      gap:10px;
      margin-top:14px;
    }

    .actions a.btn{
      display:block;
      text-align:center;
      font-size:15px;
      padding:13px 14px;
    }

    .updateCard{
      border:1px solid rgba(255,227,122,.22);
      background:rgba(255,227,122,.06);
      border-radius:14px;
      padding:12px;
      margin-bottom:10px;
    }

    .updateHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:6px;
    }

    .updateTitle{
      font-size:13px;
      font-weight:900;
      color:var(--warning);
    }

    .updateDate{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    .updateText{
      white-space:pre-wrap;
      line-height:1.45;
      font-size:14px;
      word-break:break-word;
    }

    .statusMsg{
      margin-bottom:12px;
      padding:11px 12px;
      border-radius:14px;
      font-size:13px;
      display:none;
    }

    .statusMsg.ok{
      display:block;
      background:rgba(124,227,161,.10);
      border:1px solid rgba(124,227,161,.24);
      color:#c9ffd8;
    }

    .statusMsg.err{
      display:block;
      background:rgba(255,107,107,.10);
      border:1px solid rgba(255,107,107,.24);
      color:#ffd0d0;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.62);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:1000;
    }

    .modal.show{
      display:flex;
    }

    .modalCard{
      width:min(760px, 100%);
      max-height:90vh;
      overflow:auto;
      background:linear-gradient(180deg, rgba(255,255,255,.04), transparent 55%), var(--card);
      border:1px solid rgba(255,255,255,.10);
      border-radius:20px;
      padding:16px;
      box-shadow:0 18px 60px rgba(0,0,0,.55);
    }

    .modalTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .modalTitle{
      margin:0;
      font-size:18px;
      font-weight:900;
    }

    .formGrid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    @media (min-width: 760px){
      .formGrid.two{
        grid-template-columns:1fr 1fr;
      }
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      font-size:12px;
      font-weight:900;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.2px;
    }

    .input, .textarea, .select{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(11,18,32,.85);
      color:var(--text);
      padding:11px 12px;
      font-size:14px;
      outline:none;
    }

    .textarea{
      min-height:120px;
      resize:vertical;
      font-family:inherit;
    }

    .modalActions{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:14px;
      flex-wrap:wrap;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="left">
        <img class="logo" src="{{ url_for('static', filename='img/LOGO.png') }}" alt="Logo">
        <div>
          <p class="page-small">Dettaglio Report #{{ report_id }}</p>
        </div>
      </div>
      <a class="btn" href="/MedicairGeek/storicoReport">← Storico</a>
    </div>

    <div class="card">
      <div id="loading" class="empty">Caricamento…</div>

      <div id="content" style="display:none;">
        <div id="statusBox" class="statusMsg"></div>

        <div class="toolbar">
          <button id="btnEdit" class="btn secondary" type="button">Modifica report</button>
          <button id="btnAddUpdate" class="btn warning" type="button">Inserisci update</button>
        </div>

        <div id="hero" class="hero">
          <div class="hero-date" id="heroDate"></div>
          <div class="hero-title" id="heroTitle"></div>
          <div class="hero-row">
            <div class="pill" id="catPill"></div>
          </div>
        </div>

        <div class="sectionTitle">Dati report</div>
        <div class="kv" id="kv"></div>

        <div class="sectionTitle">Note / Descrizione</div>
        <div class="box">
          <div class="note" id="note"></div>
        </div>

        <div class="sectionTitle">Update</div>
        <div id="updatesWrap"></div>

        <div class="sectionTitle">Allegati</div>
        <div class="box">
          <div class="actions" style="margin-bottom:12px;">
            <a class="btn" href="/MedicairGeek/ConsultaReport/download/{{ report_id }}">
              Download File
            </a>
          </div>

          <div class="boxValue" id="attachMeta" style="color:var(--muted);"></div>
          <div class="attachGrid" id="attachGrid"></div>
        </div>
      </div>

      <div id="error" class="empty" style="display:none;">Report non trovato.</div>
    </div>
  </div>

  <!-- Modal Modifica -->
  <div id="editModal" class="modal">
    <div class="modalCard">
      <div class="modalTop">
        <h2 class="modalTitle">Modifica report</h2>
        <button class="btn secondary" type="button" data-close="editModal">Chiudi</button>
      </div>

      <div class="formGrid two">
        <div class="field">
          <label for="fTitolo">Titolo</label>
          <input id="fTitolo" class="input" maxlength="30">
        </div>

        <div class="field">
          <label for="fCategoria">Categoria</label>
          <select id="fCategoria" class="select">
            <option value="Incidente">Incidente</option>
            <option value="Problema Software">Problema Software</option>
            <option value="Problema Hardware">Problema Hardware</option>
            <option value="Altro">Altro</option>
          </select>
        </div>

        <div class="field">
          <label for="fRobot">Robot</label>
          <input id="fRobot" class="input">
        </div>

        <div class="field">
          <label for="fZona">Zona</label>
          <input id="fZona" class="input">
        </div>

        <div class="field">
          <label for="fScaffale">Scaffale</label>
          <input id="fScaffale" class="input">
        </div>

        <div class="field">
          <label for="fCella">Cella</label>
          <input id="fCella" class="input">
        </div>

        <div class="field">
          <label for="fLuci">Luci robot</label>
          <input id="fLuci" class="input">
        </div>

        <div class="field">
          <label for="fErrore">Errore</label>
          <input id="fErrore" class="input">
        </div>

        <div class="field">
          <label for="fRimosso">Rimosso</label>
          <select id="fRimosso" class="select">
            <option value="si">si</option>
            <option value="no">no</option>
          </select>
        </div>

        <div class="field">
          <label for="fRisoluzione">Risoluzione</label>
          <input id="fRisoluzione" class="input">
        </div>
      </div>

      <div class="field" style="margin-top:10px;">
        <label for="fNote">Note / Descrizione</label>
        <textarea id="fNote" class="textarea"></textarea>
      </div>

      <div class="modalActions">
        <button class="btn secondary" type="button" data-close="editModal">Annulla</button>
        <button id="btnSaveEdit" class="btn" type="button">Salva modifiche</button>
      </div>
    </div>
  </div>

  <!-- Modal Update -->
  <div id="updateModal" class="modal">
    <div class="modalCard">
      <div class="modalTop">
        <h2 class="modalTitle">Inserisci update</h2>
        <button class="btn secondary" type="button" data-close="updateModal">Chiudi</button>
      </div>

      <div class="field">
        <label for="fUpdateText">Testo update</label>
        <textarea id="fUpdateText" class="textarea" placeholder="Scrivi qui l'update del report..."></textarea>
      </div>

      <div class="modalActions">
        <button class="btn secondary" type="button" data-close="updateModal">Annulla</button>
        <button id="btnSaveUpdate" class="btn warning" type="button">Salva update</button>
      </div>
    </div>
  </div>

  <script>
    const reportId = {{ report_id|int }};
    const loading = document.getElementById("loading");
    const content = document.getElementById("content");
    const errorBox = document.getElementById("error");

    const hero = document.getElementById("hero");
    const heroDate = document.getElementById("heroDate");
    const heroTitle = document.getElementById("heroTitle");
    const catPill = document.getElementById("catPill");

    const kvEl = document.getElementById("kv");
    const noteEl = document.getElementById("note");
    const attachMeta = document.getElementById("attachMeta");
    const attachGrid = document.getElementById("attachGrid");
    const updatesWrap = document.getElementById("updatesWrap");
    const statusBox = document.getElementById("statusBox");

    const btnEdit = document.getElementById("btnEdit");
    const btnAddUpdate = document.getElementById("btnAddUpdate");
    const btnSaveEdit = document.getElementById("btnSaveEdit");
    const btnSaveUpdate = document.getElementById("btnSaveUpdate");

    const editModal = document.getElementById("editModal");
    const updateModal = document.getElementById("updateModal");

    const formEdit = {
      titolo: document.getElementById("fTitolo"),
      categoria: document.getElementById("fCategoria"),
      robot: document.getElementById("fRobot"),
      zona: document.getElementById("fZona"),
      scaffale: document.getElementById("fScaffale"),
      cella: document.getElementById("fCella"),
      luci: document.getElementById("fLuci"),
      errore: document.getElementById("fErrore"),
      rimosso: document.getElementById("fRimosso"),
      risoluzione: document.getElementById("fRisoluzione"),
      note: document.getElementById("fNote")
    };

    const fUpdateText = document.getElementById("fUpdateText");

    let currentReport = null;

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      }[m]));
    }

    function showStatus(message, isError=false){
      statusBox.className = "statusMsg " + (isError ? "err" : "ok");
      statusBox.textContent = message || "";
      statusBox.style.display = message ? "block" : "none";
    }

    function openModal(el){ el.classList.add("show"); }
    function closeModal(el){ el.classList.remove("show"); }

    document.querySelectorAll("[data-close]").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.getAttribute("data-close");
        const modal = document.getElementById(id);
        if(modal) closeModal(modal);
      });
    });

    [editModal, updateModal].forEach(modal => {
      modal.addEventListener("click", (e) => {
        if(e.target === modal) closeModal(modal);
      });
    });

    function categoriaInfo(value){
      const v = String(value || "").trim().toLowerCase();

      if(v === "incidente"){
        return { heroClass: "cat-incidente", dotClass: "dot-incidente", label: "Incidente" };
      }
      if(v === "problema software"){
        return { heroClass: "cat-software", dotClass: "dot-software", label: "Problema Software" };
      }
      if(v === "problema hardware"){
        return { heroClass: "cat-hardware", dotClass: "dot-hardware", label: "Problema Hardware" };
      }
      return { heroClass: "cat-altro", dotClass: "dot-altro", label: value || "Altro" };
    }

    function renderHero(r){
      const info = categoriaInfo(r.categoria);

      hero.classList.remove("cat-incidente", "cat-software", "cat-hardware", "cat-altro");
      hero.classList.add(info.heroClass);

      heroDate.textContent = r.dt_label || "";
      heroTitle.textContent = r.titolo || "Senza titolo";
      catPill.innerHTML = `<span class="dot ${info.dotClass}"></span><span>${esc(info.label)}</span>`;
    }

    function renderKV(r){
      kvEl.innerHTML = "";

      const rows = [
        ["ID", r.id],
        ["Categoria", r.categoria || "—"],
        ["Titolo", r.titolo || "—"],
        ["Robot", r.robot || "—"],
        ["Zona", r.zona || "—"],
        ["Scaffale", r.scaffale || "—"],
        ["Cella", r.cella || "—"],
        ["Luci", r.luci || "—"],
        ["Errore", r.errore || "—"],
        ["Rimosso", r.rimosso || "—"],
        ["Risoluzione", r.risoluzione || "—"],
        ["Cartella", r.folder_name || "—"]
      ];

      for(const [k, v] of rows){
        const d = document.createElement("div");
        d.className = "box";
        d.innerHTML = `
          <span class="boxLabel">${esc(k)}</span>
          <div class="boxValue">${esc(v)}</div>
        `;
        kvEl.appendChild(d);
      }
    }

    function renderUpdates(r){
      updatesWrap.innerHTML = "";

      const updates = [
        { title: "Update 1", date: r.data_update1, text: r.update1 },
        { title: "Update 2", date: r.data_update2, text: r.update2 }
      ].filter(u => String(u.text || "").trim() !== "");

      if(!updates.length){
        updatesWrap.innerHTML = `<div class="empty">Nessun update presente.</div>`;
        btnAddUpdate.disabled = false;
        return;
      }

      updates.forEach(u => {
        const el = document.createElement("div");
        el.className = "updateCard";
        el.innerHTML = `
          <div class="updateHead">
            <div class="updateTitle">${esc(u.title)}</div>
            <div class="updateDate">${esc(u.date || "")}</div>
          </div>
          <div class="updateText">${esc(u.text || "")}</div>
        `;
        updatesWrap.appendChild(el);
      });

      btnAddUpdate.disabled = updates.length >= 2;
    }

    function renderAttachments(att){
      attachGrid.innerHTML = "";

      if(!att || !att.length){
        attachMeta.textContent = "Nessun allegato disponibile.";
        attachGrid.innerHTML = `<div class="empty">Nessun file trovato nella cartella report.</div>`;
        return;
      }

      attachMeta.textContent = `${att.length} file`;

      for(const a of att){
        const div = document.createElement("div");
        div.className = "attach";

        const name = esc(a.name || "");
        const url = esc(a.url || "#");
        const kind = a.kind || "file";

        let body = "";

        if(kind === "image"){
          body = `
            <a href="${url}" target="_blank" rel="noopener">
              <img class="previewImg" src="${url}" alt="${name}" loading="lazy">
            </a>
          `;
        } else if(kind === "video"){
          body = `
            <video class="previewVid" src="${url}" controls preload="metadata"></video>
            <a class="fileLink" href="${url}" target="_blank" rel="noopener">Apri video</a>
          `;
        } else {
          body = `<a class="fileLink" href="${url}" target="_blank" rel="noopener">Apri file</a>`;
        }

        div.innerHTML = `
          <p class="attachName">${name}</p>
          ${body}
        `;

        attachGrid.appendChild(div);
      }
    }

    function fillEditForm(r){
      formEdit.titolo.value = r.titolo || "";
      formEdit.categoria.value = r.categoria || "Altro";
      formEdit.robot.value = r.robot || "";
      formEdit.zona.value = r.zona || "";
      formEdit.scaffale.value = r.scaffale || "";
      formEdit.cella.value = r.cella || "";
      formEdit.luci.value = r.luci || "";
      formEdit.errore.value = r.errore || "";
      formEdit.rimosso.value = (r.rimosso || "no").toLowerCase() === "si" ? "si" : "no";
      formEdit.risoluzione.value = r.risoluzione || "";
      formEdit.note.value = r.note || "";
    }

    async function loadReport(){
      const res = await fetch(`/MedicairGeek/ConsultaReport/report/${reportId}`, { cache: "no-store" });
      const data = await res.json();

      if(!data.ok){
        throw new Error(data.error || "Report non trovato.");
      }

      const r = data.report;
      currentReport = r;

      renderHero(r);
      renderKV(r);
      noteEl.textContent = r.note || "";
      renderUpdates(r);
      renderAttachments(r.attachments || []);
      fillEditForm(r);
    }

    btnEdit.addEventListener("click", () => {
      if(!currentReport) return;
      fillEditForm(currentReport);
      openModal(editModal);
    });

    btnAddUpdate.addEventListener("click", () => {
      if(btnAddUpdate.disabled) return;
      fUpdateText.value = "";
      openModal(updateModal);
    });

    btnSaveEdit.addEventListener("click", async () => {
      try{
        showStatus("");

        const payload = {
          Titolo: formEdit.titolo.value.trim(),
          Categoria: formEdit.categoria.value.trim(),
          robot: formEdit.robot.value.trim(),
          zona: formEdit.zona.value.trim(),
          scaffale: formEdit.scaffale.value.trim(),
          cella: formEdit.cella.value.trim(),
          "luci robot": formEdit.luci.value.trim(),
          errore: formEdit.errore.value.trim(),
          rimosso: formEdit.rimosso.value.trim(),
          risoluzione: formEdit.risoluzione.value.trim(),
          note: formEdit.note.value.trim(),
          _regenerate_pdf: true
        };

        const res = await fetch(`/MedicairGeek/reportIncidente/${reportId}/edit`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const raw = await res.text();

        let data;
        try {
          data = JSON.parse(raw);
        } catch(parseErr) {
          throw new Error(`Il server non ha restituito JSON. Risposta ricevuta: ${raw.slice(0, 200)}`);
        }

        if(!res.ok || !data.ok){
          throw new Error(data.error || "Errore nel salvataggio.");
        }

        closeModal(editModal);
        await loadReport();

        let msg = "Report modificato correttamente.";
        if (data.pdf_regenerated) {
          msg += " PDF aggiornato.";
        } else if (data.pdf_message) {
          msg += " " + data.pdf_message;
        }

        showStatus(msg);
      }catch(err){
        showStatus(err.message || "Errore nel salvataggio.", true);
      }
    });
    btnSaveUpdate.addEventListener("click", async () => {
      try{
        showStatus("");

        const text = fUpdateText.value.trim();
        if(!text){
          throw new Error("Scrivi il testo dell'update.");
        }

        const res = await fetch(`/MedicairGeek/reportIncidente/${reportId}/update`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ update: text })
        });

        const data = await res.json();

        if(!res.ok || !data.ok){
          throw new Error(data.error || "Errore nel salvataggio update.");
        }

        closeModal(updateModal);
        await loadReport();
        showStatus("Update inserito correttamente.");
      }catch(err){
        showStatus(err.message || "Errore nel salvataggio update.", true);
      }
    });

    (async function(){
      try{
        await loadReport();
        loading.style.display = "none";
        content.style.display = "block";
      }catch(e){
        loading.style.display = "none";
        errorBox.style.display = "block";
      }
    })();
  </script>
</body>
</html>
